{% include "includes/navbar.html" %}
{% extends "layout.html" %}
{% block body %}
<style>
    * {
        font-family: 'BahnschriftLightSemiCondensed', sans-serif;
        user-select: none;
    }
    
    /* Slideshow Background */
    .slideshow-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* Behind everything */
        overflow: hidden;
    }

    .slideshow-image {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 2s ease-in-out; /* Smooth fade effect */
    }

    .slideshow-image.active {
        opacity: 1; /* Show active image */
    }

    /* Counter Container */
    .counter-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 80vh;
        z-index: 1; /* Above the slideshow */
        position: relative;
    }

    .counter {
        font-size: 250px;
        /* -webkit-text-stroke: 5px #0E3A2F; */
        letter-spacing: 8px;
        overflow: hidden;
        color: #78FAAE;
        /* background: rgba(120, 250, 174, 0.2); */
        border-radius: 15px;
        padding: 20px 40px;
        text-align: center;
        /* box-shadow: 0 8px 15px rgba(0, 0, 0, 0.8); */
        width: fit-content;
        margin: auto;
        z-index: 1;
        display: flex;
    }

    .counter span {
        display: inline-block;
        transform: translateY(0);
        transition: transform 0.5s ease-in-out;
        height: 100%;
    }

    .bottom-image {
        position: fixed;
        bottom: 15%;
        left: 50%;
        transform: translateX(-50%);
        width: 25%;
        height: auto;
        object-fit: contain;
        z-index: 1;
    }

    @media (max-width: 1200px) {
        .counter {
            font-size: 100px;
            margin-bottom: 70%;
        }

        .bottom-image {
            width: 50%;
            height: auto;
        }
    }
</style>
<div class="slideshow-container">
    <img src="{{ url_for('static', filename='counter-background-1.jpg') }}" class="slideshow-image active" alt="Background 1">
    <img src="{{ url_for('static', filename='counter-background-2.jpg') }}" class="slideshow-image" alt="Background 2">
    <img src="{{ url_for('static', filename='counter-background-3.jpg') }}" class="slideshow-image" alt="Background 3">
    <img src="{{ url_for('static', filename='counter-background-4.jpg') }}" class="slideshow-image" alt="Background 4">
    <img src="{{ url_for('static', filename='counter-background-5.jpg') }}" class="slideshow-image" alt="Background 5">
    <img src="{{ url_for('static', filename='counter-background-6.jpg') }}" class="slideshow-image" alt="Background 6">
    <img src="{{ url_for('static', filename='counter-background-7.jpg') }}" class="slideshow-image" alt="Background 7">
</div>
<div class="counter-container">
    <div id="car-counter" class="counter">
        <span>0</span><span>0</span><span>0</span><span>0</span><span>0</span>
    </div>
</div>
<img src="{{ url_for('static', filename='Skoda_Counter.png') }}" alt="Bottom Image" class="bottom-image">
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const apiUrl = '/dashboardapi/yillik/adet';
        const counter = document.getElementById('car-counter');
        let currentCount = 0;

        // Background Slideshow Logic
        const slideshowImages = document.querySelectorAll('.slideshow-image');
        let currentSlide = 0;

        const changeSlide = () => {
            slideshowImages[currentSlide].classList.remove('active'); // Hide current
            currentSlide = (currentSlide + 1) % slideshowImages.length; // Move to next
            slideshowImages[currentSlide].classList.add('active'); // Show next
        };

        setInterval(changeSlide, 7000); // Change slide every 7 seconds

        // Counter Logic
        const formatNumber = (number) => {
            return number.toString().padStart(5, '0').replace(/\B(?=(\d{3})+(?!\d))/g, '');
        };

        const displayNumber = (number) => {
            const formattedNumber = formatNumber(number); // e.g., "39.202"
            const counterSpans = Array.from(counter.children); // Get all existing spans
            let newHtml = '';

            // Build new HTML with spans only for digits
            formattedNumber.split('').forEach((char) => {
                if (/[0-9]/.test(char)) {
                    newHtml += `<span>${char}</span>`; // Wrap digits in spans
                } else {
                    newHtml += char; // Add separators like "." directly
                }
            });

            // Update the counter if the content has changed
            if (counter.innerHTML !== newHtml) {
                counter.innerHTML = newHtml;
            }

            // Animate digits
            const newSpans = counter.querySelectorAll('span');
            newSpans.forEach((span, index) => {
                if (counterSpans[index] && counterSpans[index].innerText !== span.innerText) {
                    span.style.transform = 'translateY(-100%)';
                    setTimeout(() => {
                        span.style.transform = 'translateY(0)';
                    }, 200); // Adjust timing for smooth animation
                }
            });

            currentCount = number;
        };

        const triggerConfetti = () => {
            // Call your confetti function here
            confetti(); // Replace with the actual function name you use for confetti
        };

        const fetchCount = () => {
            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.carsSold) {
                        const formattedNumber = parseInt(data.carsSold, 10);
                        displayNumber(formattedNumber);

                        // Check if the counter has reached 38,900
                        if (formattedNumber === 38900) {
                            triggerConfetti(); // Trigger confetti
                        }
                    }
                })
                .catch(error => console.error('Error fetching car count:', error));
        };

        // Initial load
        fetchCount();

        // Periodic updates
        setInterval(() => {
            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.carsSold && data.carsSold !== currentCount) {
                        const formattedNumber = parseInt(data.carsSold, 10);
                        displayNumber(formattedNumber);

                        triggerConfetti(); // Trigger confetti
                    }
                })
                .catch(error => console.error('Error fetching car count:', error));
        }, 300000); // Update every 5 seconds
    });
</script>

{% endblock body %}
